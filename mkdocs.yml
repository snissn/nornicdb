site_name: NornicDB Documentation
site_description: Production-ready graph database with GPU acceleration and Neo4j compatibility
site_url: https://orneryd.github.io/NornicDB/
repo_url: https://github.com/orneryd/nornicdb
repo_name: orneryd/nornicdb
edit_uri: edit/main/docs/
# use_directory_urls=true (default) gives clean canonical URLs like
# /knowledge-layer-policies/ rather than .html. site_url + use_directory_urls
# is what Material uses to emit a <link rel="canonical"> on every page.
use_directory_urls: true

theme:
  name: material
  logo: assets/logos/nornicdb-logo.svg
  favicon: assets/logos/nornic.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    # Navigation behavior. instant + tracking + prune is the combination that
    # keeps the URL in sync with the visible content when a user clicks a
    # search result, and trims the rendered nav to the active section so the
    # sidebar always reflects where you are.
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - toc.integrate
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.action.edit

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Permalink to this section
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
      emoji_index: !!python/name:pymdownx.emoji.twemoji
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/stylesheets/nornic-docs.css

# ----------------------------------------------------------------------------
# Top-level navigation
#
# Eight groups, every published page registered. With navigation.indexes,
# each top-level section's README.md becomes that section's index page so
# clicking the section header in the sidebar lands somewhere meaningful.
#
# The rule for adding a new doc: every published markdown file MUST appear
# under exactly one nav entry. Without nav membership, Material renders the
# page on direct hit but with an empty sidebar — which is the bug the user
# reported.
# ----------------------------------------------------------------------------
