name: CI

on:
  push:
    branches:
      - "main"
    paths:
      - "docker/**"
      - "lib/**"
      - "macos/**"
      - "pkg/**"
      - "plugins/**"
      - "scripts/**"
      - "ui/**"
      - "go.mod"
      - "go.sum"
  pull_request:
    branches:
      - "main"
    paths:
      - "docker/**"
      - "lib/**"
      - "macos/**"
      - "pkg/**"
      - "plugins/**"
      - "scripts/**"
      - "ui/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch, tag, or commit SHA to run CI against"
        required: true
        default: "main"
        type: string

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI assets
        run: |
          cd ui
          npm ci
          npm run build

      - name: Prepare llama CPU libs
        run: bash scripts/hydrate-llama-cpu-libs.sh

      - name: Build
        run: make build

      - name: Test
        run: |
          set -o pipefail
          # Run each package group as its own go-test invocation so a
          # crash, OOM, or hang surfaces with the package name attached.
          # Previously a single `make test-serial | grep` swallowed all
          # output, so a runner-level kill (exit 143) gave no clue which
          # package was at fault. Groups are roughly ordered by cost so
          # cheap suites fail fast.
          run_group() {
            local name="$1"; shift
            echo "::group::test ${name}"
            local start_ts=$(date +%s)
            if ! go test -p 1 -parallel 4 -timeout 30m "$@"; then
              echo "::error title=test failed::group ${name} failed"
              echo "::endgroup::"
              return 1
            fi
            local end_ts=$(date +%s)
            echo "${name} ok ($((end_ts - start_ts))s)"
            echo "::endgroup::"
          }

          # pkg/server is large enough that running it as one job blows the
          # runner memory budget and hides which slice failed when the
          # runner kills the process. Split it into focused sub-groups by
          # test-name prefix; the trailing server-rest group runs whatever
          # the named groups did not pick up, so a freshly-added test that
          # doesn't fit an existing prefix still runs in CI without anyone
          # having to remember to update this file.
          #
          # Adding a new bucket: pick a unique prefix, list it in
          # SERVER_BUCKETS_HANDLED below, and add a `run_server_group` line.
          # Adding a new test that fits an existing bucket: name it with
          # the bucket's prefix (e.g. TestAuthFoo). Adding a one-off test
          # with no bucket fit: just commit it; the catch-all picks it up.
          SERVER_BUCKETS_HANDLED='^(TestAuth|TestGDPR|TestExplicit|TestCommit|TestRollback|TestTransaction|TestDatabase|TestExecute|TestDbConfig|TestDB|TestDecay|TestMultiDatabase|TestDatabaseIsolation|TestDefaultDatabaseIsolation|TestComposite|TestCompositeRoot|TestBifrost|TestUI|TestInstrumented|TestCORS|TestSession|TestServe|TestStart|TestNew|TestAddr|TestRoute|TestBaseURL|TestBackup|TestCluster|TestGetCookie|TestGraph|TestSearch|TestCollectLatest|TestCollectSnapshot|TestDiffGraph|TestEdges|TestRetention|TestGPU|TestBuildEmbed|TestBasePathAndRBAC|TestQdrant|TestServerQdrantGRPC|TestMCP|TestSecurity|TestRBAC|TestBasicAuth|TestEmbed|TestNornic)'

          run_server_group() {
            local name="$1"; local pattern="$2"
            run_group "server-${name}" -run "${pattern}" ./pkg/server/...
          }

          run_group cmd ./cmd/...
          run_group apoc ./apoc/...
          run_group plugins ./plugins/...
          run_group util-small \
            ./pkg/audit/... ./pkg/auth/... ./pkg/buildinfo/... \
            ./pkg/cache/... ./pkg/compliance/... ./pkg/config/... \
            ./pkg/convert/... ./pkg/embed/... ./pkg/embeddingutil/... \
            ./pkg/encryption/... ./pkg/envutil/... ./pkg/errors/... \
            ./pkg/eval/... ./pkg/fabric/... ./pkg/filter/... \
            ./pkg/gpu/... ./pkg/heimdall/... ./pkg/indexing/... \
            ./pkg/inference/... ./pkg/kms/... ./pkg/knowledgepolicy/... \
            ./pkg/lifecycle/... ./pkg/linkpredict/... ./pkg/localllm/... \
            ./pkg/math/... ./pkg/mcp/... ./pkg/multidb/... \
            ./pkg/nornicgrpc/... ./pkg/observability/... ./pkg/pool/... \
            ./pkg/qdrantgrpc/... ./pkg/retention/... ./pkg/security/... \
            ./pkg/simd/... ./pkg/storage/lifecycle/... ./pkg/temporal/... \
            ./pkg/textchunk/... ./pkg/txsession/... ./pkg/util/... \
            ./pkg/vectorspace/...
          run_group graphql ./pkg/graphql/...
          run_group cypher ./pkg/cypher/...
          run_group search ./pkg/search/...
          run_group bolt ./pkg/bolt/...

          # pkg/storage is large (1000+ tests, BadgerDB I/O is heavy) and
          # was OOM'ing the runner as a single job. Split by test-name
          # prefix the same way pkg/server is split. Catch-all picks up
          # anything not matched by a named bucket so freshly-added tests
          # don't need the file updated.
          STORAGE_BUCKETS_HANDLED='^(TestBadgerEngine|TestBadgerTransaction|TestBadgerCache|TestBadgerSchemaHelpers|TestBadgerConstraintValidationHelpers|TestAsyncEngine|TestAsyncEngineConfig|TestNewAsyncEngine|TestBug|TestWAL|TestAtomicWAL|TestRecoverFromWAL|TestReplayAndUndoBulkWALEntries|TestReplayAndUndoWALEntry|TestRecoveryResultSummary|TestReplayResultSummary|TestReplayResultTracking|TestReplayResultHasCriticalErrors|TestReplayWALEntry|TestNewWAL|TestNewWALSyncsDirectory|TestDefaultWALConfig|TestSaveSnapshot|TestSaveSnapshotSyncsDirectory|TestPruneOldSnapshotFiles|TestSnapshot_|TestSnapshotAndSaveSnapshot|TestCheckAtomicWALIntegrity|TestCheckWALIntegrity|TestReadWALEntriesForTruncation|TestReadWALEntriesFromDir|TestSyncDirFunction|TestSyncDirInvalidPath|TestRecoverAbortedTransaction|TestRecoverCommittedTransaction|TestRecoverIncompleteTransaction|TestRecoverMixedTransactions|TestRecoverWithTransactions|TestBuildAtomicRecordV2|TestWriteAtomicRecordV2|TestCompositeEngine|TestCompositeIndex|TestCompositeKey|TestNamespacedEngine|TestTransaction|TestBatch|TestTx|TestNewTransaction|TestUndo|TestBeginTransaction|TestSnapshotIsolationConflict)'

          run_storage_group() {
            local name="$1"; local pattern="$2"
            run_group "storage-${name}" -run "${pattern}" ./pkg/storage
          }

          run_storage_group badger        '^(TestBadgerEngine|TestBadgerTransaction|TestBadgerCache|TestBadgerSchemaHelpers|TestBadgerConstraintValidationHelpers)'
          run_storage_group async         '^(TestAsyncEngine|TestAsyncEngineConfig|TestNewAsyncEngine|TestBug)'
          run_storage_group wal-recovery  '^(TestWAL|TestAtomicWAL|TestRecoverFromWAL|TestReplayAndUndoBulkWALEntries|TestReplayAndUndoWALEntry|TestRecoveryResultSummary|TestReplayResultSummary|TestReplayResultTracking|TestReplayResultHasCriticalErrors|TestReplayWALEntry|TestNewWAL|TestNewWALSyncsDirectory|TestDefaultWALConfig|TestSaveSnapshot|TestSaveSnapshotSyncsDirectory|TestPruneOldSnapshotFiles|TestSnapshot_|TestSnapshotAndSaveSnapshot|TestCheckAtomicWALIntegrity|TestCheckWALIntegrity|TestReadWALEntriesForTruncation|TestReadWALEntriesFromDir|TestSyncDirFunction|TestSyncDirInvalidPath|TestRecoverAbortedTransaction|TestRecoverCommittedTransaction|TestRecoverIncompleteTransaction|TestRecoverMixedTransactions|TestRecoverWithTransactions|TestBuildAtomicRecordV2|TestWriteAtomicRecordV2)'
          run_storage_group composite-tx  '^(TestCompositeEngine|TestCompositeIndex|TestCompositeKey|TestNamespacedEngine|TestTransaction|TestBatch|TestTx|TestNewTransaction|TestUndo|TestBeginTransaction|TestSnapshotIsolationConflict)'
          run_group storage-rest -skip "${STORAGE_BUCKETS_HANDLED}" ./pkg/storage

          run_group nornicdb ./pkg/nornicdb/...

          # pkg/server, split. Order is roughly cheapest-first.
          run_server_group core-tx       '^(TestAuth|TestGDPR|TestExplicit|TestCommit|TestRollback|TestTransaction)'
          run_server_group db            '^(TestDatabase(Adapter|Empty|Info|Unknown)|TestExecute|TestDbConfig|TestDB|TestDecay)'
          run_server_group multidb       '^(TestMultiDatabase|TestDatabaseIsolation|TestDefaultDatabaseIsolation|TestComposite|TestCompositeRoot)'
          run_server_group wiring        '^(TestBifrost|TestUI|TestInstrumented|TestCORS|TestSession|TestServe|TestStart|TestNew|TestAddr|TestRoute|TestBaseURL|TestBackup|TestCluster|TestGetCookie)'
          run_server_group graph-search  '^(TestGraph|TestSearch|TestCollectLatest|TestCollectSnapshot|TestDiffGraph|TestEdges|TestRetention|TestGPU|TestBuildEmbed|TestBasePathAndRBAC)'
          run_server_group integrations  '^(TestQdrant|TestServerQdrantGRPC|TestMCP|TestSecurity|TestRBAC|TestBasicAuth|TestEmbed|TestNornic)'
          # Catch-all: everything in pkg/server not picked up by a named
          # bucket above. -skip is supported on Go 1.20+.
          run_group server-rest -skip "${SERVER_BUCKETS_HANDLED}" ./pkg/server/...

          run_group replication ./pkg/replication/...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    env:
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Build UI assets
        run: |
          cd ui
          npm ci
          npm run build

      - name: Prepare llama CPU libs
        run: bash scripts/hydrate-llama-cpu-libs.sh

      - name: Generate coverage report
        run: |
          set -o pipefail
          # Mirror the test step's grouping so a failing or hung
          # package surfaces with a name attached instead of timing
          # out the whole job. Each group appends to the same raw
          # profile; a single filter pass at the end produces
          # coverage.out for goveralls. Coverage exclusions
          # (generated code, GPU stubs, etc.) live in
          # scripts/generate-coverage.sh so the per-group invocations
          # don't need to know about them.
          : > coverage.raw.out

          run_cov_group() {
            local name="$1"; shift
            echo "::group::coverage ${name}"
            if ! bash scripts/generate-coverage.sh --append coverage.raw.out "$name" "$@"; then
              echo "::error title=coverage failed::group ${name} failed"
              echo "::endgroup::"
              return 1
            fi
            echo "::endgroup::"
          }

          # Mirror the test job's pkg/server split. The catch-all covers
          # any new test prefix not handled by a named bucket so coverage
          # stays complete without manual maintenance per new test file.
          SERVER_BUCKETS_HANDLED='^(TestAuth|TestGDPR|TestExplicit|TestCommit|TestRollback|TestTransaction|TestDatabase|TestExecute|TestDbConfig|TestDB|TestDecay|TestMultiDatabase|TestDatabaseIsolation|TestDefaultDatabaseIsolation|TestComposite|TestCompositeRoot|TestBifrost|TestUI|TestInstrumented|TestCORS|TestSession|TestServe|TestStart|TestNew|TestAddr|TestRoute|TestBaseURL|TestBackup|TestCluster|TestGetCookie|TestGraph|TestSearch|TestCollectLatest|TestCollectSnapshot|TestDiffGraph|TestEdges|TestRetention|TestGPU|TestBuildEmbed|TestBasePathAndRBAC|TestQdrant|TestServerQdrantGRPC|TestMCP|TestSecurity|TestRBAC|TestBasicAuth|TestEmbed|TestNornic)'

          run_cov_server_group() {
            local name="$1"; local pattern="$2"
            run_cov_group "server-${name}" -run "${pattern}" ./pkg/server/...
          }

          run_cov_group util-small \
            ./pkg/audit/... ./pkg/auth/... ./pkg/buildinfo/... \
            ./pkg/cache/... ./pkg/compliance/... ./pkg/config/... \
            ./pkg/convert/... ./pkg/embed/... ./pkg/embeddingutil/... \
            ./pkg/encryption/... ./pkg/envutil/... ./pkg/errors/... \
            ./pkg/eval/... ./pkg/fabric/... ./pkg/filter/... \
            ./pkg/gpu/... ./pkg/heimdall/... ./pkg/indexing/... \
            ./pkg/inference/... ./pkg/kms/... ./pkg/knowledgepolicy/... \
            ./pkg/lifecycle/... ./pkg/linkpredict/... ./pkg/localllm/... \
            ./pkg/math/... ./pkg/mcp/... ./pkg/multidb/... \
            ./pkg/nornicgrpc/... ./pkg/observability/... ./pkg/pool/... \
            ./pkg/qdrantgrpc/... ./pkg/retention/... ./pkg/security/... \
            ./pkg/simd/... ./pkg/storage/lifecycle/... ./pkg/temporal/... \
            ./pkg/textchunk/... ./pkg/txsession/... ./pkg/util/... \
            ./pkg/vectorspace/...
          run_cov_group graphql ./pkg/graphql/...
          run_cov_group cypher ./pkg/cypher/...
          run_cov_group search ./pkg/search/...
          run_cov_group bolt ./pkg/bolt/...

          # pkg/storage split — mirror the test job. Keep both lists in
          # sync; if you add a bucket above, add it here too. The
          # catch-all -skip pattern means coverage stays complete even
          # if a new test file lands without explicit bucket assignment.
          STORAGE_BUCKETS_HANDLED='^(TestBadgerEngine|TestBadgerTransaction|TestBadgerCache|TestBadgerSchemaHelpers|TestBadgerConstraintValidationHelpers|TestAsyncEngine|TestAsyncEngineConfig|TestNewAsyncEngine|TestBug|TestWAL|TestAtomicWAL|TestRecoverFromWAL|TestReplayAndUndoBulkWALEntries|TestReplayAndUndoWALEntry|TestRecoveryResultSummary|TestReplayResultSummary|TestReplayResultTracking|TestReplayResultHasCriticalErrors|TestReplayWALEntry|TestNewWAL|TestNewWALSyncsDirectory|TestDefaultWALConfig|TestSaveSnapshot|TestSaveSnapshotSyncsDirectory|TestPruneOldSnapshotFiles|TestSnapshot_|TestSnapshotAndSaveSnapshot|TestCheckAtomicWALIntegrity|TestCheckWALIntegrity|TestReadWALEntriesForTruncation|TestReadWALEntriesFromDir|TestSyncDirFunction|TestSyncDirInvalidPath|TestRecoverAbortedTransaction|TestRecoverCommittedTransaction|TestRecoverIncompleteTransaction|TestRecoverMixedTransactions|TestRecoverWithTransactions|TestBuildAtomicRecordV2|TestWriteAtomicRecordV2|TestCompositeEngine|TestCompositeIndex|TestCompositeKey|TestNamespacedEngine|TestTransaction|TestBatch|TestTx|TestNewTransaction|TestUndo|TestBeginTransaction|TestSnapshotIsolationConflict)'

          run_cov_storage_group() {
            local name="$1"; local pattern="$2"
            run_cov_group "storage-${name}" -run "${pattern}" ./pkg/storage
          }

          run_cov_storage_group badger        '^(TestBadgerEngine|TestBadgerTransaction|TestBadgerCache|TestBadgerSchemaHelpers|TestBadgerConstraintValidationHelpers)'
          run_cov_storage_group async         '^(TestAsyncEngine|TestAsyncEngineConfig|TestNewAsyncEngine|TestBug)'
          run_cov_storage_group wal-recovery  '^(TestWAL|TestAtomicWAL|TestRecoverFromWAL|TestReplayAndUndoBulkWALEntries|TestReplayAndUndoWALEntry|TestRecoveryResultSummary|TestReplayResultSummary|TestReplayResultTracking|TestReplayResultHasCriticalErrors|TestReplayWALEntry|TestNewWAL|TestNewWALSyncsDirectory|TestDefaultWALConfig|TestSaveSnapshot|TestSaveSnapshotSyncsDirectory|TestPruneOldSnapshotFiles|TestSnapshot_|TestSnapshotAndSaveSnapshot|TestCheckAtomicWALIntegrity|TestCheckWALIntegrity|TestReadWALEntriesForTruncation|TestReadWALEntriesFromDir|TestSyncDirFunction|TestSyncDirInvalidPath|TestRecoverAbortedTransaction|TestRecoverCommittedTransaction|TestRecoverIncompleteTransaction|TestRecoverMixedTransactions|TestRecoverWithTransactions|TestBuildAtomicRecordV2|TestWriteAtomicRecordV2)'
          run_cov_storage_group composite-tx  '^(TestCompositeEngine|TestCompositeIndex|TestCompositeKey|TestNamespacedEngine|TestTransaction|TestBatch|TestTx|TestNewTransaction|TestUndo|TestBeginTransaction|TestSnapshotIsolationConflict)'
          run_cov_group storage-rest -skip "${STORAGE_BUCKETS_HANDLED}" ./pkg/storage

          run_cov_group nornicdb ./pkg/nornicdb/...

          run_cov_server_group core-tx       '^(TestAuth|TestGDPR|TestExplicit|TestCommit|TestRollback|TestTransaction)'
          run_cov_server_group db            '^(TestDatabase(Adapter|Empty|Info|Unknown)|TestExecute|TestDbConfig|TestDB|TestDecay)'
          run_cov_server_group multidb       '^(TestMultiDatabase|TestDatabaseIsolation|TestDefaultDatabaseIsolation|TestComposite|TestCompositeRoot)'
          run_cov_server_group wiring        '^(TestBifrost|TestUI|TestInstrumented|TestCORS|TestSession|TestServe|TestStart|TestNew|TestAddr|TestRoute|TestBaseURL|TestBackup|TestCluster|TestGetCookie)'
          run_cov_server_group graph-search  '^(TestGraph|TestSearch|TestCollectLatest|TestCollectSnapshot|TestDiffGraph|TestEdges|TestRetention|TestGPU|TestBuildEmbed|TestBasePathAndRBAC)'
          run_cov_server_group integrations  '^(TestQdrant|TestServerQdrantGRPC|TestMCP|TestSecurity|TestRBAC|TestBasicAuth|TestEmbed|TestNornic)'
          run_cov_group server-rest -skip "${SERVER_BUCKETS_HANDLED}" ./pkg/server/...

          run_cov_group replication ./pkg/replication/...

          bash scripts/generate-coverage.sh --filter coverage.raw.out coverage.out

      - name: Install goveralls
        run: go install github.com/mattn/goveralls@latest

      - name: Upload coverage to Coveralls
        if: ${{ env.COVERALLS_REPO_TOKEN != '' }}
        run: |
          "$(go env GOPATH)/bin/goveralls" \
            -coverprofile=coverage.out \
            -service=github \
            -repotoken="$COVERALLS_REPO_TOKEN"
