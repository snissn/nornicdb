{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nornicdb.fullname" . }}-telemetry
  labels:
    {{- include "nornicdb.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nornicdb.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow Bolt and HTTP from anywhere within the cluster
    - ports:
        - port: {{ .Values.service.boltPort }}
          protocol: TCP
        - port: {{ .Values.service.httpPort }}
          protocol: TCP
    # K8S-04: Restrict telemetry port to monitoring namespace only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: {{ .Values.service.telemetryPort }}
          protocol: TCP
{{- end }}
